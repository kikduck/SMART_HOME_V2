# Smart Home V2 - Stack Portainer (Admin + LLM)
# Activer la stack = Admin + LLM démarrés. Désactiver = tout arrêté.
#
# OPTION A - Déploiement depuis Git (recommandé) :
#   Portainer > Stacks > Add stack > Build method: Git Repository
#   URL: https://github.com/kikduck/TEST
#   Compose path: SMART_HOME_V2/docker-compose.portainer.yml
#   Puis configurer les volumes (voir ci-dessous)
#
# Chemin local : remplacez /home/elliot/SMART_HOME_V2 si votre projet est ailleurs
#
# Prérequis : ./download_model.sh (modèle dans models/Qwen3.5-2B-Q6_K.gguf)

version: "3.8"

# Remplacez /home/elliot/SMART_HOME_V2 par votre chemin si différent
services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    volumes:
      - /home/elliot/SMART_HOME_V2/models:/models
    command:
      - "-m"
      - "/models/Qwen3.5-2B-Q6_K.gguf"
      - "--port"
      - "8085"
      - "--host"
      - "0.0.0.0"
      - "-c"
      - "2048"
      - "-ngl"
      - "0"
      - "-t"
      - "4"
      - "-ub"
      - "1024"
    ports:
      - "0.0.0.0:8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - "0.0.0.0:8070:8000"
    volumes:
      - /home/elliot/SMART_HOME_V2/knowledge:/app/knowledge
      - /home/elliot/SMART_HOME_V2/schemas:/app/schemas
      - /home/elliot/SMART_HOME_V2/prompts:/app/prompts
      - /home/elliot/SMART_HOME_V2/models:/app/models
    environment:
      - SMART_HOME_BASE=/app
      - LLAMA_BASE_URL=http://llama:8085
    depends_on:
      llama:
        condition: service_healthy
    restart: unless-stopped
